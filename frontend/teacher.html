<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>老師看板 – Sentence Builder</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .round-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 14px;
    }
    .round-tab {
      padding: 4px 14px;
      border-radius: 999px;
      font-size: .82rem;
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid var(--gray-200);
      background: var(--gray-100);
      color: var(--gray-600);
      transition: all .15s;
    }
    .round-tab.active {
      background: var(--brand);
      color: #fff;
      border-color: var(--brand);
    }
    .round-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: .82rem;
      font-weight: 600;
    }
    .round-status.open  { background: var(--green-light); color: var(--green); }
    .round-status.closed { background: var(--gray-100); color: var(--gray-400); }
    .btn-danger {
      background: var(--red-light);
      color: var(--red);
      border: 1.5px solid #fecaca;
    }
    .btn-danger:hover { background: #fecaca; }
  </style>
</head>
<body>
  <div class="page-wrap">

    <!-- Header -->
    <header>
      <h1>
        📚 Sentence Builder
        <span class="badge badge-teacher">
          <span class="dot dot-purple"></span> 老師
        </span>
      </h1>
      <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
        <div class="conn-status">
          <span class="conn-dot" id="connDot"></span>
          <span id="connLabel">連線中…</span>
        </div>
        <a href="student.html" class="btn-secondary" style="text-decoration:none; padding:6px 14px; border-radius:8px; font-size:.85rem;">
          開啟學生頁面 ↗
        </a>
      </div>
    </header>

    <!-- Stats Bar -->
    <div class="stats-bar">
      <div class="stat-box">
        <div class="stat-num" id="statStudents">0</div>
        <div class="stat-lbl">學生在線</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="statRound">0</div>
        <div class="stat-lbl">目前輪次</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="statSubmissions">0</div>
        <div class="stat-lbl">本輪提交</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="statAvgScore">—</div>
        <div class="stat-lbl">本輪平均分</div>
      </div>
    </div>

    <!-- 輪次控制 -->
    <div class="card">
      <div class="card-title" style="justify-content:space-between; flex-wrap:wrap; gap:8px;">
        <span>🎯 輪次控制</span>
        <span class="round-status closed" id="roundStatus">
          <span class="dot dot-purple" style="animation:none; background:var(--gray-400)"></span>
          尚未開始
        </span>
      </div>

      <div class="input-row" style="margin-bottom:12px;">
        <input
          type="text"
          id="wordInput"
          placeholder="輸入單字（例如：Apple）"
          maxlength="60"
          autocomplete="off"
        />
        <button class="btn-primary" id="startRoundBtn">▶ 開始新一輪</button>
      </div>

      <button class="btn-danger" id="endRoundBtn" disabled style="width:100%;">
        ⏹ 結束本輪作答
      </button>

      <!-- 當前單字 + AI 範例 -->
      <div style="margin-top:16px; display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
        <span style="font-size:.85rem; color:var(--gray-400);">目前單字：</span>
        <strong id="activeWordDisplay" style="color:var(--brand); font-size:1.15rem;">(尚未設定)</strong>
      </div>
      <div id="exampleBox" style="display:none; margin-top:10px;">
        <div style="font-size:.75rem; color:var(--gray-400); text-transform:uppercase; letter-spacing:.06em; margin-bottom:4px;">AI 範例句</div>
        <div class="example-text" id="exampleSentence"></div>
      </div>
    </div>

    <!-- 歷史答案（分輪次） -->
    <div class="card">
      <div class="card-title" style="justify-content:space-between;">
        <span>📋 學生答案</span>
        <div id="roundTabs" class="round-tabs"></div>
      </div>
      <div class="history-wrap" id="historyWrap">
        <div class="history-empty" id="historyEmpty">
          還沒有答案，廣播單字並開始作答吧！
        </div>
      </div>
    </div>

  </div>

  <div id="toast"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // ─── State ────────────────────────────────────────────────────────────────
    // rounds: { [roundNum]: { word, answers: [] } }
    const roundData = {};
    let activeTab = null;       // 目前顯示哪一輪
    let currentRoundNum = 0;
    let isRoundActive = false;

    // ─── Socket ───────────────────────────────────────────────────────────────
    const socket = io({ query: { role: 'teacher' } });

    // ─── DOM ──────────────────────────────────────────────────────────────────
    const wordInput         = document.getElementById('wordInput');
    const startRoundBtn     = document.getElementById('startRoundBtn');
    const endRoundBtn       = document.getElementById('endRoundBtn');
    const activeWordDisplay = document.getElementById('activeWordDisplay');
    const historyWrap       = document.getElementById('historyWrap');
    const historyEmpty      = document.getElementById('historyEmpty');
    const statStudents      = document.getElementById('statStudents');
    const statRound         = document.getElementById('statRound');
    const statSubmissions   = document.getElementById('statSubmissions');
    const statAvgScore      = document.getElementById('statAvgScore');
    const connDot           = document.getElementById('connDot');
    const connLabel         = document.getElementById('connLabel');
    const exampleBox        = document.getElementById('exampleBox');
    const exampleSentence   = document.getElementById('exampleSentence');
    const roundStatus       = document.getElementById('roundStatus');
    const roundTabs         = document.getElementById('roundTabs');

    // ─── 連線狀態 ─────────────────────────────────────────────────────────────
    socket.on('connect', () => {
      connDot.className = 'conn-dot online';
      connLabel.textContent = '已連線';
    });
    socket.on('disconnect', () => {
      connDot.className = 'conn-dot offline';
      connLabel.textContent = '已斷線';
    });

    // ─── Init ─────────────────────────────────────────────────────────────────
    socket.on('init', ({ word, roundActive, currentRound, rounds, studentCount }) => {
      statStudents.textContent = studentCount;
      isRoundActive = roundActive;
      currentRoundNum = currentRound;

      // 重建歷史輪次資料
      if (rounds && rounds.length) {
        rounds.forEach(r => {
          roundData[r.roundNum] = { word: r.word, answers: r.answers };
          ensureTab(r.roundNum, r.word);
        });
        showTab(currentRound);
      }

      if (word) activeWordDisplay.textContent = word;
      if (roundActive) setRoundOpen(currentRound);
      else if (currentRound > 0) setRoundClosed();
    });

    // ─── 學生人數 ──────────────────────────────────────────────────────────────
    socket.on('student_count', ({ count }) => {
      statStudents.textContent = count;
    });

    // ─── 新一輪開始（伺服器確認） ────────────────────────────────────────────
    socket.on('round_started', ({ word, roundNum }) => {
      currentRoundNum = roundNum;
      isRoundActive = true;
      roundData[roundNum] = { word, answers: [] };
      ensureTab(roundNum, word);
      showTab(roundNum);
      activeWordDisplay.textContent = word;
      setRoundOpen(roundNum);
      exampleBox.style.display = 'none';
      exampleSentence.textContent = '';
      showToast(`第 ${roundNum} 輪開始，單字：${word}`);
    });

    // ─── 本輪結束（伺服器確認） ──────────────────────────────────────────────
    socket.on('round_ended', ({ roundNum }) => {
      isRoundActive = false;
      setRoundClosed();
      showToast(`第 ${roundNum} 輪已結束`);
    });

    // ─── 新答案進來 ───────────────────────────────────────────────────────────
    socket.on('new_answer', (entry) => {
      const { roundNum } = entry;
      if (!roundData[roundNum]) roundData[roundNum] = { word: entry.word, answers: [] };
      roundData[roundNum].answers.push(entry);

      if (entry.result.example) showExample(entry.result.example);

      // 如果目前在看這一輪，直接插入
      if (activeTab === roundNum) {
        historyEmpty.style.display = 'none';
        prependHistoryItem(entry);
        refreshRoundStats(roundNum);
      }

      showToast(`${entry.studentName} 提交了答案`);
    });

    // ─── 開始新一輪 ───────────────────────────────────────────────────────────
    startRoundBtn.addEventListener('click', startRound);
    wordInput.addEventListener('keydown', e => { if (e.key === 'Enter') startRound(); });

    function startRound() {
      const word = wordInput.value.trim();
      if (!word) { showToast('請先輸入單字'); return; }
      socket.emit('start_round', { word });
      wordInput.value = '';
    }

    // ─── 結束本輪 ─────────────────────────────────────────────────────────────
    endRoundBtn.addEventListener('click', () => {
      if (!isRoundActive) return;
      socket.emit('end_round');
    });

    // ─── 輪次 Tab 管理 ────────────────────────────────────────────────────────

    function ensureTab(roundNum, word) {
      if (document.getElementById(`tab-${roundNum}`)) return;
      const btn = document.createElement('button');
      btn.className = 'round-tab';
      btn.id = `tab-${roundNum}`;
      btn.textContent = `第${roundNum}輪：${word}`;
      btn.addEventListener('click', () => showTab(roundNum));
      roundTabs.appendChild(btn);
    }

    function showTab(roundNum) {
      activeTab = roundNum;

      // 更新 tab 樣式
      document.querySelectorAll('.round-tab').forEach(t => t.classList.remove('active'));
      const tab = document.getElementById(`tab-${roundNum}`);
      if (tab) tab.classList.add('active');

      // 重新渲染歷史
      historyWrap.innerHTML = '';
      historyWrap.appendChild(historyEmpty);

      const data = roundData[roundNum];
      if (!data || !data.answers.length) {
        historyEmpty.style.display = '';
        historyEmpty.textContent = `第 ${roundNum} 輪還沒有答案。`;
        statSubmissions.textContent = '0';
        statAvgScore.textContent = '—';
        return;
      }

      historyEmpty.style.display = 'none';
      // 由新到舊顯示
      [...data.answers].reverse().forEach(prependHistoryItem);
      refreshRoundStats(roundNum);
    }

    function refreshRoundStats(roundNum) {
      const data = roundData[roundNum];
      if (!data || !data.answers.length) return;
      const scores = data.answers.map(a => a.result.score);
      statSubmissions.textContent = scores.length;
      statAvgScore.textContent = Math.round(scores.reduce((a, b) => a + b, 0) / scores.length);
    }

    // ─── 輪次狀態 UI ─────────────────────────────────────────────────────────

    function setRoundOpen(roundNum) {
      statRound.textContent = roundNum;
      roundStatus.className = 'round-status open';
      roundStatus.innerHTML = `<span class="dot dot-green"></span> 第 ${roundNum} 輪作答中`;
      startRoundBtn.textContent = '▶ 開始新一輪（會結束目前輪次）';
      endRoundBtn.disabled = false;
    }

    function setRoundClosed() {
      roundStatus.className = 'round-status closed';
      roundStatus.innerHTML = `<span class="dot" style="background:var(--gray-400);animation:none"></span> 作答已結束`;
      startRoundBtn.textContent = '▶ 開始新一輪';
      endRoundBtn.disabled = true;
    }

    // ─── 渲染答案卡 ───────────────────────────────────────────────────────────

    function prependHistoryItem(entry) {
      const { studentName, sentence, result, timestamp } = entry;
      const time = new Date(timestamp).toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
      const scoreClass = result.score >= 70 ? 'high' : result.score >= 40 ? 'medium' : 'low';

      const pills = [
        { label: '文法正確', ok: result.grammar },
        { label: '有用到單字', ok: result.uses_word },
        { label: '句意通順', ok: result.meaningful },
      ].map(c => `<span class="check-pill ${c.ok ? 'ok' : 'bad'}">${c.ok ? '✓' : '✗'} ${c.label}</span>`).join('');

      const div = document.createElement('div');
      div.className = 'history-item';
      div.innerHTML = `
        <div class="hi-header">
          <span class="hi-name">${escHtml(studentName)}</span>
          <span class="hi-time">${time}</span>
        </div>
        <div class="hi-sentence">"${escHtml(sentence)}"</div>
        <div class="hi-pills">
          ${pills}
          <span class="score-badge ${scoreClass}" style="margin-left:auto">${result.score}/100</span>
        </div>
        ${result.feedback ? `<div class="feedback-text" style="margin-top:6px;font-size:.82rem;">${escHtml(result.feedback)}</div>` : ''}
      `;
      historyWrap.insertBefore(div, historyWrap.firstChild);
    }

    function showExample(text) {
      exampleSentence.textContent = `"${text}"`;
      exampleBox.style.display = 'block';
    }

    // ─── Toast ────────────────────────────────────────────────────────────────
    let toastTimer;
    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
    }

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
